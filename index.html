                border-radius: 50%;
                background: rgba(0, 0, 0, 0.12);
                color: #1f4a2d;
                font-size: 9px;
                font-weight: 800;
                display: inline-grid;
                place-items: center;
                font-style: italic;
            }
            .cp-legend {
                display: flex;
                flex-wrap: wrap;
                gap: 14px;
                padding: 10px 18px 14px;
                font-size: 11px;
                font-weight: 600;
                color: var(--ink-2);
            }
            .cp-legend .dot {
                display: inline-block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                margin-right: 5px;
                vertical-align: middle;
            }
            .cp-notes {
                padding: 14px 18px;
            }
            .cp-notes textarea {
                width: 100%;
                min-height: 140px;
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 10px;
                font-family: inherit;
                font-size: 13px;
                resize: vertical;
            }

            /* Selection bar above chart */
            .rtc-bar {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                background: #fbfaf7;
                border-radius: 12px;
                margin-bottom: 10px;
                font-size: 13px;
            }
            .rtc-bar .count {
                font-weight: 800;
                color: var(--persimmon);
                font-family: "JetBrains Mono", monospace;
            }
            .rtc-bar .chips {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                flex: 1;
            }
            .rtc-bar .chip {
                background: var(--persimmon);
                color: #fff;
                font-size: 11px;
                font-weight: 700;
                padding: 3px 8px;
                border-radius: 99px;
                font-family: "JetBrains Mono", monospace;
            }
            .rtc-bar .clear {
                color: var(--ink-3);
                font-size: 12px;
                font-weight: 700;
                padding: 6px 10px;
                border-radius: 6px;
            }
            .rtc-bar .clear:hover {
                color: var(--persimmon);
                background: #fff;
            }

            .vitals {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 14px;
            }
            .vital {
                background: var(--bg);
                border-radius: 14px;
                padding: 14px;
            }
            .vital .l {
                font-size: 11px;
                color: var(--ink-3);
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }
            .vital .v {
                font-size: 22px;
                font-weight: 700;
                color: var(--ink-2);
                letter-spacing: -0.02em;
                margin-top: 4px;
            }
            .vital .d {
                font-size: 11px;
                color: var(--ink-3);
                font-weight: 600;
                margin-top: 2px;
            }

            .alerts {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .alert {
                background: #ffeee0;
                border-radius: 12px;
                padding: 10px 14px;
                font-size: 13px;
                font-weight: 700;
                color: #b65a1f;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .alert.med {
                background: #ffe2e3;
                color: #a64242;
            }
            .alert.info {
                background: #dbeeef;
                color: #34666a;
            }

            /* Tweaks panel adjustments */
            .toolbar-spacer {
                flex: 1;
            }

            /* responsive: tweak min widths */
            @media (max-width: 1500px) {
                .panel {
                    width: 680px;
                }
            }

            /* Empty state */
            .empty {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                color: var(--ink-3);
                font-weight: 600;
            }

            /* Toast */
            .toast {
                position: fixed;
                left: 50%;
                bottom: 32px;
                transform: translateX(-50%) translateY(120%);
                background: var(--ink);
                color: #fff;
                padding: 12px 22px;
                border-radius: 100px;
                font-weight: 700;
                font-size: 14px;
                box-shadow: var(--shadow-pop);
                z-index: 300;
                transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
                display: inline-flex;
                align-items: center;
                gap: 10px;
            }
            .toast.show {
                transform: translateX(-50%) translateY(0);
            }
            .toast .check {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: #9cb37a;
                display: grid;
                place-items: center;
                color: #fff;
            }
        </style>
    </head>

        <div id="root"></div>
        <script type="application/json" id="speaker-notes">
            []
        </script>

        <script
            src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"
        ></script>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Persimmon — Practice Management</title>
        <meta name="viewport" content="width=1440" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <meta name="theme-color" content="#F73C1F" />
        <style>
            :root {
                --bg: #f7f6f3;
                --bg-2: #ffffff;
                --ink: #162b41;
                --ink-2: #363636;
                --ink-3: #6a697d;
                --ink-mute: rgba(54, 54, 54, 0.55);
                --olive: #464e01;
                --olive-deep: #363c00;
                --persimmon: #f73c1f;
                --persimmon-soft: #ffeee0;
                --line: rgba(206, 206, 213, 0.55);
                --line-strong: #cdc7c4;
                --chip: #f2ecde;
                --pastel-yellow: #fff9e9;
                --pastel-peach: #ffeee0;
                --pastel-mint: #dbefe7;
                --pastel-sky: #dbeeef;
                --pastel-lavender: #edddff;
                --pastel-pink: #efdbed;
                --pastel-blush: #ffe2e3;
                --pastel-lime: #e6efdb;
                --pastel-blue: #d5e5ff;
                --pastel-cream: #efe9db;
                --shadow-soft:
                    0 1px 2px rgba(22, 43, 65, 0.04),
                    0 8px 24px rgba(22, 43, 65, 0.06);
                --shadow-pop:
                    0 1px 2px rgba(22, 43, 65, 0.05),
                    0 16px 48px rgba(22, 43, 65, 0.12);
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
                background: var(--bg);
                font-family: "Plus Jakarta Sans", system-ui, sans-serif;
                color: var(--ink-2);
                -webkit-font-smoothing: antialiased;
            }
            body {
                overflow-x: hidden;
            }
            button {
                font-family: inherit;
                cursor: pointer;
                border: 0;
                background: none;
                color: inherit;
            }
            input,
            textarea,
            select {
                font-family: inherit;
            }
            ::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(54, 54, 54, 0.18);
                border-radius: 8px;
                border: 2px solid var(--bg);
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }

            /* ---------- App shell ---------- */
            .app {
                position: relative;
                min-height: 100vh;
                padding: 16px 16px 16px 86px;
            }
            .sidebar {
                position: fixed;
                left: 16px;
                top: 16px;
                width: 54px;
                background: var(--olive);
                border-radius: 100px;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 8px 0 16px;
                gap: 6px;
                z-index: 50;
                box-shadow: 0 8px 32px rgba(70, 78, 1, 0.18);
            }
            .sb-logo {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: var(--bg);
                display: grid;
                place-items: center;
                margin: 7px 0 22px;
            }
            .sb-logo svg {
                width: 22px;
                height: 22px;
            }
            .sb-item {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: grid;
                place-items: center;
                color: rgba(255, 255, 255, 0.55);
                transition:
                    background 0.18s,
                    color 0.18s,
                    transform 0.18s;
                position: relative;
            }
            .sb-item:hover {
                color: #fff;
                background: rgba(255, 255, 255, 0.07);
            }
            .sb-item.active {
                background: var(--persimmon);
                color: #fff;
            }
            .sb-item svg {
                width: 20px;
                height: 20px;
            }
            .sb-spacer {
                flex: 1;
            }

            /* ---------- Top bar ---------- */
            .topbar {
                display: grid;
                grid-template-columns: minmax(280px, 1fr) auto minmax(
                        120px,
                        1fr
                    );
                align-items: center;
                gap: 16px;
                padding: 0 0 16px;
                height: 64px;
            }
            .topbar > .topbar-title {
                justify-self: start;
                min-width: 0;
            }
            .topbar > .topbar-title h1 {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .topbar > .topbar-title .sub {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .topbar > .search {
                margin: 0;
                justify-self: center;
            }
            .topbar > .topbar-end {
                justify-self: end;
                display: flex;
                align-items: center;
                gap: 14px;
            }
            .topbar h1 {
                font-size: 28px;
                font-weight: 700;
                color: var(--olive);
                letter-spacing: -0.04em;
                line-height: 1;
                margin: 0;
            }
            .topbar .sub {
                font-weight: 600;
                font-size: 13px;
                color: var(--ink-3);
                margin-left: 2px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .topbar .sub .dot {
                width: 3px;
                height: 3px;
                border-radius: 50%;
                background: rgba(54, 54, 54, 0.4);
            }
            .search {
                margin-left: auto;
                width: min(520px, 38vw);
                min-width: 280px;
                height: 44px;
                border-radius: 100px;
                background: #fff;
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 0 6px 0 24px;
                box-shadow: 0 1px 0 rgba(22, 43, 65, 0.04);
            }
            .search input {
                flex: 1;
                border: 0;
                outline: 0;
                background: transparent;
                font-size: 14px;
                font-weight: 600;
                color: var(--ink-2);
            }
            .search input::placeholder {
                color: rgba(54, 54, 54, 0.55);
            }
            .search-btn {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: var(--persimmon);
                color: #fff;
                display: grid;
                place-items: center;
            }
            .search-btn svg {
                width: 16px;
                height: 16px;
            }
            .topbar .iconbtn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: #fff;
                display: grid;
                place-items: center;
                color: var(--ink-2);
                transition:
                    transform 0.15s,
                    box-shadow 0.15s;
            }
            .topbar .iconbtn:hover {
                transform: translateY(-1px);
                box-shadow: var(--shadow-soft);
            }
            .topbar .iconbtn.primary {
                background: var(--persimmon);
                color: #fff;
            }
            .sub-toolbar .iconbtn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: grid;
                place-items: center;
                background: #fff;
                color: var(--ink-2);
                transition:
                    transform 0.15s,
                    box-shadow 0.15s,
                    filter 0.15s;
            }
            .sub-toolbar .iconbtn:hover {
                transform: translateY(-1px);
                box-shadow: var(--shadow-soft);
            }
            .sub-toolbar .iconbtn.primary {
                background: #f73c1f;
                color: #fff;
            }
            .sub-toolbar .iconbtn.primary:hover {
                filter: brightness(1.05);
            }
            .me {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                overflow: hidden;
                background: #ddd;
                background-image: url("assets/avatar-2.jpg");
                background-size: cover;
                background-position: center;
                border: 2px solid #fff;
            }
            .bell-dot {
                position: absolute;
                top: 9px;
                right: 10px;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--persimmon);
                border: 2px solid #fff;
            }

            /* ---------- Sub-toolbar ---------- */
            .sub-toolbar {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 0 0 18px;
            }
            .pill {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                background: #fff;
                border-radius: 100px;
                padding: 0 16px;
                height: 44px;
                font-weight: 700;
                font-size: 14px;
                color: var(--ink);
                transition:
                    box-shadow 0.15s,
                    transform 0.1s;
            }
            .pill .icon {
                display: grid;
                place-items: center;
                width: 24px;
                height: 24px;
                color: var(--persimmon);
            }
            .pill .icon svg {
                width: 18px;
                height: 18px;
            }
            .pill button {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                display: grid;
                place-items: center;
                color: var(--ink-3);
            }
            .pill button:hover {
                background: rgba(54, 54, 54, 0.05);
                color: var(--ink);
            }
            .pill button svg {
                width: 14px;
                height: 14px;
            }
            .pill.spacer {
                margin-left: auto;
            }
            .seg {
                background: #fff;
                border-radius: 100px;
                height: 44px;
                display: flex;
                align-items: center;
                gap: 0;
                padding: 2px;
            }
            .seg button {
                height: 40px;
                border-radius: 100px;
                padding: 0 22px;
                font-weight: 700;
                font-size: 14px;
                color: rgba(22, 43, 65, 0.5);
                transition:
                    color 0.15s,
                    background 0.15s;
            }
            .seg button.on {
                background: var(--bg);
                color: var(--persimmon);
            }
            .filter-pill {
                background: #fff;
                border-radius: 100px;
                height: 44px;
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 12px 0 20px;
                font-weight: 700;
                font-size: 14px;
                color: var(--ink);
                position: relative;
                cursor: pointer;
                transition:
                    transform 0.15s,
                    box-shadow 0.15s;
            }
            .filter-pill:hover {
                transform: translateY(-1px);
                box-shadow: var(--shadow-soft);
            }
            .filter-pill.active {
                background: var(--persimmon);
                color: #fff;
            }
            .filter-pill.active svg {
                color: #fff;
            }
            .filter-pill .count {
                background: var(--persimmon);
                color: #fff;
                font-size: 11px;
                font-weight: 800;
                min-width: 20px;
                height: 20px;
                border-radius: 99px;
                padding: 0 6px;
                display: grid;
                place-items: center;
            }
            .filter-pill.active .count {
                background: rgba(255, 255, 255, 0.25);
            }
            .filter-pill svg {
                width: 18px;
                height: 18px;
                color: var(--ink-3);
            }
            .filter-pop {
                position: absolute;
                top: calc(100% + 8px);
                right: 0;
                background: #fff;
                border-radius: 18px;
                box-shadow: var(--shadow-pop);
                padding: 18px;
                width: 340px;
                z-index: 50;
                display: flex;
                flex-direction: column;
                gap: 14px;
                animation: popIn 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            @keyframes popIn {
                from {
                    opacity: 0;
                    transform: translateY(-6px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .filter-pop h4 {
                margin: 0;
                font-size: 11px;
                font-weight: 800;
                color: var(--ink-3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .filter-chips {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin-top: 8px;
            }
            .filter-chip {
                border: 1px solid var(--line);
                background: #fff;
                color: var(--ink-2);
                border-radius: 99px;
                padding: 6px 12px;
                font-size: 12px;
                font-weight: 700;
                transition:
                    background 0.12s,
                    border-color 0.12s,
                    color 0.12s;
                cursor: pointer;
            }
            .filter-chip:hover {
                border-color: var(--ink-3);
            }
            .filter-chip.on {
                background: var(--ink);
                border-color: var(--ink);
                color: #fff;
            }
            .filter-pop-foot {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-top: 6px;
                border-top: 1px solid var(--line);
            }
            .filter-pop-foot button {
                font-size: 13px;
                font-weight: 700;
                padding: 8px 14px;
                border-radius: 99px;
            }
            .filter-pop-foot .clear {
                color: var(--ink-3);
            }
            .filter-pop-foot .clear:hover {
                color: var(--persimmon);
            }
            .filter-pop-foot .apply {
                background: var(--ink);
                color: #fff;
            }

            /* ---------- Main canvas ---------- */
            .canvas {
                background: #fff;
                border-radius: 24px 24px 0 0;
                min-height: calc(100vh - 32px - 64px - 62px);
                overflow: hidden;
                position: relative;
            }
            .canvas-huddle {
                background: var(--bg);
            }

            /* ---------- Schedule ---------- */
            .grid-wrap {
                display: flex;
                flex-direction: column;
            }
            .op-head {
                display: grid;
                grid-template-columns: 96px repeat(var(--ops, 6), 1fr);
                border-bottom: 1px solid var(--line);
                background: #fff;
                position: sticky;
                top: 0;
                z-index: 5;
            }
            .op-head .corner {
                height: 64px;
            }
            .op-head .opcell {
                padding: 14px 18px;
                border-left: 1px solid var(--line);
            }
            .op-head .opcell .name {
                font-weight: 700;
                color: var(--ink);
                font-size: 15px;
                letter-spacing: -0.01em;
            }
            .op-head .opcell .doc {
                font-size: 12px;
                color: rgba(54, 54, 54, 0.55);
                font-weight: 600;
                margin-top: 3px;
            }
            .op-head .opcell .chair-status {
                margin-top: 8px;
                display: inline-flex;
                gap: 6px;
                align-items: center;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--ink-3);
            }
            .op-head .opcell .chair-status .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #9cb37a;
            }
            .op-head .opcell .chair-status.busy .dot {
                background: var(--persimmon);
            }

            .grid-body {
                position: relative;
            }
            .grid {
                display: grid;
                grid-template-columns: 96px repeat(var(--ops, 6), 1fr);
                position: relative;
            }
            .timecol {
                display: flex;
                flex-direction: column;
            }
            .timeslot {
                height: 80px;
                display: flex;
                align-items: flex-start;
                justify-content: flex-start;
                padding: 8px 12px 0 14px;
                font-weight: 700;
                font-size: 12px;
                color: var(--ink-3);
                border-bottom: 1px dashed rgba(206, 206, 213, 0.6);
            }
            .opcol {
                position: relative;
                border-left: 1px solid var(--line);
            }
            .opcol .row {
                height: 80px;
                border-bottom: 1px dashed rgba(206, 206, 213, 0.6);
            }
            .opcol .row.half {
                border-bottom: 1px dotted rgba(206, 206, 213, 0.4);
            }
            /* now line */
            .now-line {
                position: absolute;
                left: 0;
                right: 0;
                height: 0;
                border-top: 1.5px solid var(--persimmon);
                z-index: 4;
                pointer-events: none;
            }
            .now-line::before {
                content: attr(data-label);
                position: absolute;
                left: -78px;
                top: -9px;
                font-size: 11px;
                font-weight: 700;
                color: var(--persimmon);
                background: #fff;
                padding: 2px 6px;
                border-radius: 6px;
            }
            .now-line::after {
                content: "";
                position: absolute;
                left: -4px;
                top: -5px;
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background: var(--persimmon);
            }

            /* Appointment card */
            .appt {
                position: absolute;
                left: 8px;
                right: 8px;
                border-radius: 16px;
                padding: 14px 16px;
                background: var(--pastel-yellow);
                overflow: hidden;
                cursor: pointer;
                transition:
                    transform 0.15s,
                    box-shadow 0.15s,
                    filter 0.15s;
                border: 1.5px solid transparent;
            }
            .appt:hover {
                transform: translateY(-1px);
                box-shadow: var(--shadow-soft);
            }
            .appt.selected {
                box-shadow:
                    0 0 0 2px var(--persimmon),
                    var(--shadow-soft);
            }
            .appt .name {
                font-weight: 700;
                font-size: 16px;
                color: var(--ink-2);
                letter-spacing: -0.005em;
                margin: 0 0 4px;
            }
            .appt .time {
                font-size: 12px;
                font-weight: 700;
                color: rgba(54, 54, 54, 0.5);
                margin: 0 0 10px;
            }
            .appt .codes {
                display: flex;
                flex-direction: column;
                gap: 3px;
                font-size: 11.5px;
                font-weight: 700;
                color: rgba(54, 54, 54, 0.6);
            }
            .appt .codes .code {
                display: flex;
                gap: 8px;
            }
            .appt .codes .code b {
                color: rgba(54, 54, 54, 0.7);
                font-weight: 700;
            }
            .appt .footer {
                position: absolute;
                left: 14px;
                right: 14px;
                bottom: 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .appt .avatars {
                display: flex;
            }
            .avatar-stack {
                display: flex;
            }
            .avatar-stack .av {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                border: 2px solid #fff;
                background-size: cover;
                background-position: center;
                margin-left: -8px;
            }
            .avatar-stack .av:first-child {
                margin-left: 0;
            }
            .status-pill {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                height: 32px;
                padding: 0 14px;
                border-radius: 100px;
                background: #fff;
                font-size: 12px;
                font-weight: 700;
                color: rgba(22, 43, 65, 0.65);
            }
            .status-pill .dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: currentColor;
                opacity: 0.55;
            }
            .status-pill.complete {
                background: #e6efdb;
                color: #5a7a2f;
            }
            .status-pill.confirmed {
                background: #fff;
                color: var(--ink-3);
            }
            .status-pill.in-chair {
                background: #fff;
                color: var(--ink-3);
            }
            .status-pill.unconfirmed {
                background: #ffe2e3;
                color: #a64242;
            }
            .status-pill.no-show {
                background: #ffe2e3;
                color: #a64242;
            }
            .appt[data-color="yellow"] {
                background: var(--pastel-yellow);
            }
            .appt[data-color="peach"] {
                background: var(--pastel-peach);
            }
            .appt[data-color="mint"] {
                background: var(--pastel-mint);
            }
            .appt[data-color="sky"] {
                background: var(--pastel-sky);
            }
            .appt[data-color="lavender"] {
                background: var(--pastel-lavender);
            }
            .appt[data-color="pink"] {
                background: var(--pastel-pink);
            }
            .appt[data-color="blush"] {
                background: var(--pastel-blush);
            }
            .appt[data-color="lime"] {
                background: var(--pastel-lime);
            }
            .appt[data-color="blue"] {
                background: var(--pastel-blue);
            }
            .appt[data-color="cream"] {
                background: var(--pastel-cream);
            }

            /* Hover popover for empty cells */
            .cell-hover {
                position: absolute;
                border: 2px dashed transparent;
                border-radius: 14px;
                left: 6px;
                right: 6px;
                pointer-events: none;
                transition:
                    border-color 0.12s,
                    background 0.12s;
            }
            .cell-hot {
                border-color: rgba(247, 60, 31, 0.45);
                background: rgba(247, 60, 31, 0.04);
            }
            .mini-pop {
                position: fixed;
                background: #fff;
                border-radius: 14px;
                padding: 14px 16px;
                width: 240px;
                box-shadow: var(--shadow-pop);
                z-index: 200;
                pointer-events: none;
                font-size: 13px;
                border: 1px solid rgba(206, 206, 213, 0.5);
            }
            .mini-pop .title {
                font-weight: 700;
                color: var(--ink);
                font-size: 14px;
                margin-bottom: 4px;
            }
            .mini-pop .row {
                display: flex;
                justify-content: space-between;
                color: var(--ink-3);
                font-weight: 600;
                margin-top: 4px;
            }
            .mini-pop .add {
                color: var(--persimmon);
                font-weight: 700;
                margin-top: 8px;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .appt-pop {
                position: fixed;
                background: #fff;
                border-radius: 14px;
                padding: 14px 16px;
                width: 280px;
                box-shadow: var(--shadow-pop);
                z-index: 200;
                pointer-events: none;
                font-size: 13px;
                border: 1px solid rgba(206, 206, 213, 0.5);
            }
            .appt-pop h4 {
                margin: 0 0 4px;
                font-size: 15px;
                font-weight: 700;
                color: var(--ink);
            }
            .appt-pop .meta {
                font-size: 12px;
                color: var(--ink-3);
                font-weight: 600;
                margin-bottom: 10px;
            }
            .appt-pop .kv {
                display: flex;
                justify-content: space-between;
                font-size: 12px;
                margin-top: 4px;
                color: var(--ink-2);
                font-weight: 600;
            }
            .appt-pop .kv span:first-child {
                color: var(--ink-3);
            }

            /* ---------- Side panel ---------- */
            .scrim {
                position: fixed;
                inset: 0;
                background: rgba(22, 43, 65, 0.18);
                backdrop-filter: blur(2px);
                z-index: 90;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s;
            }
            .scrim.open {
                opacity: 1;
                pointer-events: auto;
            }
            .panel {
                position: fixed;
                top: 16px;
                bottom: 16px;
                right: 16px;
                width: 780px;
                background: var(--bg);
                border-radius: 24px;
                z-index: 100;
                box-shadow: var(--shadow-pop);
                transform: translateX(110%);
                transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .panel.open {
                transform: translateX(0);
            }
            .panel-head {
                padding: 24px 28px 18px;
                display: flex;
                gap: 20px;
                align-items: center;
                border-bottom: 1px solid var(--line);
            }
            .panel-close {
                position: absolute;
                right: 24px;
                top: 24px;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: #fff;
                display: grid;
                place-items: center;
                color: var(--ink-3);
            }
            .panel-close:hover {
                color: var(--ink);
            }
            .panel-avatar {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                background-size: cover;
                background-position: center;
                border: 2px solid #fff;
                background-color: #ddd;
            }
            .panel-head .who h2 {
                margin: 0 0 4px;
                font-size: 24px;
                font-weight: 700;
                color: var(--ink-2);
                letter-spacing: -0.02em;
            }
            .panel-head .who .meta {
                font-size: 12px;
                font-weight: 700;
                color: rgba(54, 54, 54, 0.5);
            }
            .panel-head .codes {
                margin-left: auto;
                text-align: right;
                font-size: 12px;
                font-weight: 700;
                color: var(--ink-3);
            }
            .panel-head .codes b {
                color: var(--ink-2);
            }
            .panel-tabs {
                display: flex;
                gap: 6px;
                padding: 0 28px;
                border-bottom: 1px solid var(--line);
                background: var(--bg);
            }
            .panel-tabs button {
                height: 48px;
                padding: 0 14px;
                font-weight: 700;
                font-size: 14px;
                color: var(--ink-3);
                position: relative;
            }
            .panel-tabs button.on {
                color: var(--ink);
            }
            .panel-tabs button.on::after {
                content: "";
                position: absolute;
                left: 14px;
                right: 14px;
                bottom: -1px;
                height: 2px;
                background: var(--persimmon);
                border-radius: 2px;
            }
            .panel-body {
                flex: 1;
                overflow: auto;
                padding: 24px 28px 100px;
            }
            .panel-foot {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                padding: 16px 28px;
                background: linear-gradient(
                    180deg,
                    rgba(247, 246, 243, 0),
                    rgba(247, 246, 243, 1) 30%
                );
                display: flex;
                gap: 12px;
                justify-content: flex-end;
            }
            .btn {
                height: 48px;
                padding: 0 24px;
                border-radius: 100px;
                font-weight: 700;
                font-size: 14px;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                transition:
                    transform 0.1s,
                    box-shadow 0.15s,
                    background 0.15s;
            }
            .btn-secondary {
                background: #fff;
                color: var(--persimmon);
                border: 1.5px solid var(--persimmon);
            }
            .btn-secondary:hover {
                background: rgba(247, 60, 31, 0.06);
            }
            .btn-primary {
                background: var(--persimmon);
                color: #fff;
            }
            .btn-primary:hover {
                background: #dc3219;
            }
            .btn-ghost {
                background: transparent;
                color: var(--ink-3);
            }
            .btn-ghost:hover {
                background: rgba(54, 54, 54, 0.05);
                color: var(--ink);
            }

            .section-card {
                background: #fff;
                border-radius: 20px;
                padding: 22px;
                margin-bottom: 14px;
            }
            .section-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--ink);
                margin: 0 0 14px;
                letter-spacing: -0.005em;
            }
            .section-sub {
                font-size: 18px;
                font-weight: 600;
                color: var(--ink-3);
                margin: 0 0 14px;
                font-family: Inter, sans-serif;
            }
            .kv-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px 24px;
            }
            .kv {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 0;
                border-bottom: 1px solid var(--line);
            }
            .kv:last-child {
                border-bottom: 0;
            }
            .kv .k {
                color: var(--ink-3);
                font-weight: 600;
                font-size: 13px;
            }
            .kv .v {
                color: var(--ink-2);
                font-weight: 700;
                font-size: 14px;
            }
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 5px 12px;
                border-radius: 100px;
                background: var(--chip);
                font-size: 12px;
                font-weight: 700;
                color: var(--ink-2);
            }
            .badge.ok {
                background: #e6efdb;
                color: #5a7a2f;
            }
            .badge.warn {
                background: #ffeee0;
                color: #b65a1f;
            }
            .badge.alert {
                background: #ffe2e3;
                color: #a64242;
            }
            .badge.info {
                background: #dbeeef;
                color: #34666a;
            }

            .ins-row {
                display: grid;
                grid-template-columns: 1.2fr 1fr 1fr 1fr;
                gap: 8px;
                padding: 10px 0;
                border-bottom: 1px solid var(--line);
                font-size: 13px;
            }
            .ins-row:last-child {
                border-bottom: 0;
            }
            .ins-row .lbl {
                color: var(--ink-3);
                font-weight: 600;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                display: block;
                margin-bottom: 3px;
            }
            .ins-row b {
                font-weight: 700;
                color: var(--ink-2);
            }

            .progress {
                height: 8px;
                background: var(--bg);
                border-radius: 99px;
                overflow: hidden;
            }
            .progress > i {
                display: block;
                height: 100%;
                background: var(--persimmon);
                border-radius: 99px;
            }

            /* Notes / chips */
            .chip-row {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .chip-row .badge {
                font-size: 11px;
                padding: 4px 10px;
            }
            .timeline {
                display: flex;
                flex-direction: column;
                gap: 0;
            }
            .timeline .step {
                display: flex;
                gap: 14px;
                align-items: flex-start;
                padding: 8px 0;
                position: relative;
            }
            .timeline .step .dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--line-strong);
                margin-top: 6px;
                flex-shrink: 0;
                position: relative;
                z-index: 1;
            }
            .timeline .step.done .dot {
                background: #5a7a2f;
            }
            .timeline .step.now .dot {
                background: var(--persimmon);
                box-shadow: 0 0 0 4px rgba(247, 60, 31, 0.18);
            }
            .timeline .step::before {
                content: "";
                position: absolute;
                left: 4.5px;
                top: 18px;
                bottom: -8px;
                width: 1px;
                background: var(--line-strong);
            }
            .timeline .step:last-child::before {
                display: none;
            }
            .timeline .step .body {
                flex: 1;
            }
            .timeline .step .body .t {
                font-size: 13px;
                font-weight: 700;
                color: var(--ink-2);
            }
            .timeline .step .body .s {
                font-size: 12px;
                color: var(--ink-3);
            }

            /* ---------- Huddle (3-zone layout) ---------- */
            .canvas-huddle {
                padding: 0 24px 24px;
                overflow-x: auto;
            }
            .huddle-layout {
                display: grid;
                grid-template-columns: 400px minmax(560px, 1fr) 300px;
                gap: 16px;
                align-items: stretch;
                min-width: 1300px;
            }
            .hud-col {
                display: flex;
                flex-direction: column;
                gap: 18px;
                min-width: 0;
            }

            /* --- Left column cards --- */
            .kpi-util {
                background: #fff;
                border-radius: 20px;
                padding: 22px 24px 20px;
                display: flex;
                flex-direction: column;
                flex: 1;
                transition:
                    box-shadow 0.15s,
                    transform 0.15s;
            }
            .kpi-util:hover {
                box-shadow: var(--shadow-soft);
            }
            .util-ring {
                position: relative;
                flex: 1;
                display: grid;
                place-items: center;
                margin-top: 8px;
                min-height: 240px;
            }
            .util-ring svg {
                display: block;
            }
            .util-center {
                position: absolute;
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
            }
            .util-center .v {
                display: flex;
                align-items: flex-start;
            }
            .util-center .v .big {
                font-size: 54px;
                font-weight: 700;
                letter-spacing: -0.04em;
                color: var(--ink-2);
                line-height: 1;
            }
            .util-center .v .pct {
                font-size: 28px;
                font-weight: 700;
                color: var(--ink-2);
                margin-top: 6px;
                letter-spacing: -0.02em;
            }
            .util-center .l {
                font-size: 13px;
                font-weight: 600;
                color: var(--ink-3);
                margin-top: 4px;
            }

            .kpi-visits {
                position: relative;
                border-radius: 20px;
                overflow: hidden;
                color: #fff;
                padding: 22px 24px;
                background: radial-gradient(
                    ellipse 100% 80% at 80% 30%,
                    #ff7b53 0%,
                    #f73c1f 45%,
                    #b92e16 100%
                );
                min-height: 248px;
                display: flex;
                flex-direction: column;
                box-shadow:
                    0 1px 2px rgba(247, 60, 31, 0.12),
                    0 16px 40px rgba(247, 60, 31, 0.18);
                transition:
                    box-shadow 0.15s,
                    transform 0.15s;
            }
            .kpi-visits:hover {
                transform: translateY(-1px);
                box-shadow:
                    0 1px 2px rgba(247, 60, 31, 0.12),
                    0 20px 48px rgba(247, 60, 31, 0.28);
            }
            .vis-glow {
                position: absolute;
                inset: -30%;
                background: radial-gradient(
                    circle at 80% 20%,
                    rgba(255, 255, 255, 0.18),
                    transparent 50%
                );
                pointer-events: none;
            }
            .vis-top {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 12px;
                position: relative;
                z-index: 1;
            }
            .vis-title {
                font-size: 24px;
                font-weight: 700;
                letter-spacing: -0.02em;
                line-height: 1.1;
                color: #fff;
            }
            .vis-stack {
                display: flex;
                align-items: center;
            }
            .vis-stack .av {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                border: 2px solid #f73c1f;
                background-size: cover;
                background-position: center;
                background-color: #fff;
            }
            .vis-go {
                margin-left: 6px;
                width: 34px;
                height: 34px;
                border-radius: 50%;
                background: #fff;
                color: var(--persimmon);
                display: grid;
                place-items: center;
                transition: transform 0.15s;
            }
            .vis-go:hover {
                transform: translateY(-1px) rotate(-8deg);
            }
            .vis-bullets {
                list-style: none;
                margin: 18px 0 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                gap: 6px;
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.92);
                line-height: 1.5;
                position: relative;
                z-index: 1;
            }
            .vis-bullets li {
                position: relative;
                padding-left: 14px;
            }
            .vis-bullets li::before {
                content: "→";
                position: absolute;
                left: 0;
                opacity: 0.85;
            }
            .vis-num {
                margin-top: auto;
                font-size: 64px;
                font-weight: 800;
                letter-spacing: -0.04em;
                line-height: 0.9;
                color: #fff;
                position: relative;
                z-index: 1;
            }

            /* --- Middle KPI grid --- */
            .kpi-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-auto-rows: minmax(0, auto);
                gap: 18px;
                flex: 1;
            }
            .kpi-grid .kpi {
                border-radius: 20px;
                padding: 20px 22px;
                background: #fff;
                position: relative;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                transition:
                    transform 0.15s,
                    box-shadow 0.15s;
            }
            .kpi-grid .kpi:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-soft);
            }
            .kpi-grid .kpi-tall {
                min-height: 188px;
            }
            .kpi-grid .kpi-short {
                min-height: 188px;
            }
            .kpi-spacer {
                flex: 1;
                min-height: 8px;
            }
            .kpi-grid .kpi.white {
                background: #fff;
            }
            .kpi-grid .kpi.peach {
                background: var(--pastel-peach);
            }
            .kpi-grid .kpi.lavender {
                background: var(--pastel-lavender);
            }
            .kpi-grid .kpi.mint {
                background: var(--pastel-mint);
            }
            .kpi-grid .kpi.yellow {
                background: var(--pastel-yellow);
            }
            .kpi-grid .kpi.pink {
                background: var(--pastel-pink);
            }
            .kpi-grid .kpi.sky {
                background: var(--pastel-sky);
            }
            .kpi-grid .kpi.cream {
                background: var(--pastel-cream);
            }
            .kpi-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--ink);
                letter-spacing: -0.005em;
                margin: 0;
                line-height: 1.2;
            }
            .kpi-sub {
                font-size: 11px;
                font-weight: 600;
                color: rgba(54, 54, 54, 0.5);
                margin: 5px 0 0;
                line-height: 1.4;
                max-width: 90%;
            }
            .kpi-value {
                font-size: 34px;
                font-weight: 700;
                letter-spacing: -0.03em;
                color: var(--ink-2);
                line-height: 1;
                margin-top: 4px;
            }
            .kpi-cents {
                font-size: 20px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }
            .kpi-corner-icon {
                position: absolute;
                right: 18px;
                top: 18px;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.7);
                display: grid;
                place-items: center;
                color: var(--persimmon);
            }
            .kpi-corner-icon svg {
                width: 14px;
                height: 14px;
            }
            .kpi-trend {
                font-size: 12px;
                font-weight: 700;
                color: #5a7a2f;
                display: inline-flex;
                align-items: center;
                gap: 4px;
                margin-top: 8px;
                align-self: flex-start;
            }
            .kpi-trend.down {
                color: #a64242;
            }

            /* --- Right rail: Assigned To Me --- */
            .task-card {
                background: #fff;
                border-radius: 20px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                height: 100%;
            }
            .task-card-head {
                background: var(--pastel-yellow);
                padding: 18px 20px;
                border-radius: 20px 20px 0 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .task-card-head h3 {
                margin: 0;
                font-size: 18px;
                font-weight: 700;
                color: var(--olive);
                letter-spacing: -0.01em;
            }
            .task-count {
                background: var(--olive);
                color: #fff;
                font-size: 11px;
                font-weight: 800;
                min-width: 22px;
                height: 22px;
                border-radius: 99px;
                padding: 0 8px;
                display: grid;
                place-items: center;
                letter-spacing: 0;
            }
            .task-card-body {
                flex: 1;
                overflow: auto;
            }
            .task-row {
                width: 100%;
                text-align: left;
                padding: 16px 20px;
                border-bottom: 1px solid var(--line);
                background: #fff;
                display: flex;
                align-items: flex-start;
                gap: 12px;
                transition: background 0.12s;
                cursor: pointer;
            }
            .task-row:hover {
                background: var(--pastel-yellow);
            }
            .task-row:last-of-type {
                border-bottom: 0;
            }
            .tr-body {
                flex: 1;
                min-width: 0;
            }
            .tr-title {
                font-size: 14px;
                font-weight: 700;
                color: var(--ink-2);
                letter-spacing: -0.005em;
                line-height: 1.3;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .tr-meta {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-top: 6px;
                font-size: 12px;
                font-weight: 700;
            }
            .tr-due {
                color: var(--persimmon);
            }
            .tr-due.today {
                color: var(--persimmon);
            }
            .tr-dot {
                width: 2px;
                height: 2px;
                border-radius: 50%;
                background: rgba(54, 54, 54, 0.5);
            }
            .tr-by {
                color: var(--ink-2);
                font-weight: 600;
            }
            .task-card-foot {
                border-top: 1px solid var(--line);
                padding: 12px 20px;
            }
            .task-card-foot button {
                color: var(--persimmon);
                font-weight: 700;
                font-size: 13px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            .task-card-foot button:hover {
                gap: 10px;
            }

            /* --- Task Modal --- */
            .task-scrim {
                position: fixed;
                inset: 0;
                background: rgba(22, 43, 65, 0.32);
                backdrop-filter: blur(3px);
                z-index: 200;
                animation: fadeIn 0.2s ease;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translate(-50%, -46%);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
            }
            .task-modal {
                position: fixed;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 640px;
                max-height: 86vh;
                background: #fff;
                border-radius: 24px;
                z-index: 201;
                box-shadow: var(--shadow-pop);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                animation: slideUp 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            .task-x {
                position: absolute;
                right: 18px;
                top: 18px;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: var(--bg);
                display: grid;
                place-items: center;
                color: var(--ink-3);
                z-index: 2;
                transition:
                    color 0.12s,
                    background 0.12s;
            }
            .task-x:hover {
                color: var(--ink);
                background: var(--line);
            }
            .task-head {
                padding: 28px 32px 20px;
                background: var(--pastel-yellow);
                border-bottom: 1px solid var(--line);
            }
            .task-meta {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--ink-3);
            }
            .task-cat {
                color: var(--olive);
            }
            .task-dot {
                width: 3px;
                height: 3px;
                border-radius: 50%;
                background: rgba(54, 54, 54, 0.4);
            }
            .task-pri {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 3px 9px;
                border-radius: 99px;
                font-size: 10px;
                font-weight: 800;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }
            .task-pri svg {
                width: 11px;
                height: 11px;
            }
            .task-due {
                color: var(--persimmon);
            }
            .task-title {
                margin: 10px 0 12px;
                font-size: 24px;
                font-weight: 700;
                color: var(--ink-2);
                letter-spacing: -0.02em;
                line-height: 1.25;
                max-width: 520px;
            }
            .task-assigned {
                font-size: 13px;
                color: var(--ink-3);
                font-weight: 600;
                display: flex;
                gap: 6px;
            }
            .task-assigned b {
                color: var(--ink-2);
                font-weight: 700;
            }

            .task-body {
                flex: 1;
                overflow: auto;
                padding: 24px 32px;
                display: flex;
                flex-direction: column;
                gap: 24px;
            }
            .task-sec h4 {
                margin: 0 0 10px;
                font-size: 11px;
                font-weight: 800;
                color: var(--ink-3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }
            .task-sec p {
                margin: 0;
                font-size: 14px;
                line-height: 1.6;
                color: var(--ink-2);
                font-weight: 500;
            }
            .task-patient {
                width: 100%;
                background: var(--bg);
                border-radius: 14px;
                padding: 14px 16px;
                display: flex;
                align-items: center;
                gap: 14px;
                text-align: left;
                transition:
                    background 0.12s,
                    transform 0.12s;
                cursor: pointer;
            }
            .task-patient:hover {
                background: #efede6;
                transform: translateX(2px);
            }
            .task-patient .av {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background-size: cover;
                background-position: center;
                flex-shrink: 0;
            }
            .task-patient .info {
                flex: 1;
                min-width: 0;
            }
            .task-patient .nm {
                font-size: 15px;
                font-weight: 700;
                color: var(--ink-2);
            }
            .task-patient .sub {
                font-size: 12px;
                color: var(--ink-3);
                font-weight: 600;
                margin-top: 2px;
            }
            .task-patient svg {
                color: var(--ink-3);
                flex-shrink: 0;
            }

            .task-attach {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .task-ref {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: var(--bg);
                border-radius: 99px;
                padding: 7px 12px;
                font-size: 12px;
                font-weight: 600;
                color: var(--ink-2);
                transition: background 0.12s;
            }
            .task-ref:hover {
                background: #efede6;
            }

            .task-activity {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .ta-row {
                display: flex;
                gap: 12px;
                align-items: flex-start;
            }
            .ta-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--persimmon);
                margin-top: 6px;
                flex-shrink: 0;
                box-shadow: 0 0 0 3px rgba(247, 60, 31, 0.15);
            }
            .ta-dot.mute {
                background: var(--line-strong);
                box-shadow: none;
            }
            .ta-text {
                font-size: 13px;
                color: var(--ink-2);
                font-weight: 500;
                flex: 1;
            }
            .ta-text b {
                font-weight: 700;
            }
            .ta-when {
                display: block;
                font-size: 11px;
                color: var(--ink-3);
                font-weight: 600;
                margin-top: 1px;
            }

            .task-compose {
                background: var(--bg);
                border-radius: 14px;
                padding: 12px;
            }
            .task-compose textarea {
                width: 100%;
                border: 0;
                background: transparent;
                outline: 0;
                resize: none;
                font-size: 14px;
                line-height: 1.5;
                min-height: 60px;
                color: var(--ink-2);
            }
            .task-compose textarea::placeholder {
                color: rgba(54, 54, 54, 0.5);
            }
            .task-compose-foot {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 6px;
            }
            .task-compose-foot .link {
                color: var(--ink-3);
                font-size: 12px;
                font-weight: 700;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 6px 10px;
                border-radius: 99px;
            }
            .task-compose-foot .link:hover {
                color: var(--ink);
                background: rgba(54, 54, 54, 0.05);
            }
            .task-send {
                background: var(--ink);
                color: #fff;
                font-size: 13px;
                font-weight: 700;
                padding: 8px 14px;
                border-radius: 99px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                transition: background 0.12s;
            }
            .task-send:hover {
                background: #0d1d2c;
            }

            .task-foot {
                padding: 16px 24px;
                background: #fff;
                border-top: 1px solid var(--line);
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .task-foot .btn {
                height: 42px;
                padding: 0 18px;
                font-size: 13px;
            }
            .visit-card .v-sub {
                font-size: 12px;
                font-weight: 600;
                opacity: 0.8;
                line-height: 1.4;
                max-width: 80%;
            }

            /* ---------- Patients table ---------- */
            .pt-table {
                width: 100%;
                border-collapse: collapse;
            }
            .pt-table thead th {
                text-align: left;
                padding: 18px 20px;
                font-size: 11px;
                font-weight: 700;
                color: var(--ink-3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                border-bottom: 1px solid var(--line);
                background: #fff;
                position: sticky;
                top: 0;
            }
            .pt-table tbody tr {
                transition: background 0.15s;
                cursor: pointer;
            }
            .pt-table tbody tr:hover {
                background: rgba(247, 246, 243, 0.7);
            }
            .pt-table td {
                padding: 14px 20px;
                font-size: 14px;
                font-weight: 600;
                color: var(--ink-2);
                border-bottom: 1px solid var(--line);
                vertical-align: middle;
            }
            .pt-name {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .pt-name .av {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background-size: cover;
                background-position: center;
                background-color: #ddd;
            }
            .pt-name .nm {
                font-weight: 700;
                color: var(--ink-2);
                font-size: 14px;
            }
            .pt-name .id {
                font-size: 11px;
                color: var(--ink-3);
                font-family: "JetBrains Mono", monospace;
                font-weight: 500;
                letter-spacing: 0.02em;
            }
            .pt-bal.due {
                color: var(--persimmon);
                font-weight: 700;
            }

            /* Patient detail */
            .pd {
                padding: 0;
                display: flex;
                flex-direction: column;
            }
            .pd-head {
                padding: 28px 32px;
                background: #fff;
                display: flex;
                gap: 24px;
                align-items: center;
                border-bottom: 1px solid var(--line);
            }
            .pd-back {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: var(--bg);
                display: grid;
                place-items: center;
                color: var(--ink-2);
                transition: transform 0.12s;
            }
            .pd-back:hover {
                transform: translateX(-2px);
            }
            .pd-photo {
                width: 88px;
                height: 88px;
                border-radius: 50%;
                background-size: cover;
                background-position: center;
                background-color: #ddd;
                border: 2px solid #fff;
                box-shadow: 0 0 0 1px var(--line-strong);
            }
            .pd-id h2 {
                font-size: 28px;
                font-weight: 700;
                color: var(--ink-2);
                margin: 0 0 4px;
                letter-spacing: -0.02em;
            }
            .pd-id .meta {
                display: flex;
                gap: 14px;
                font-size: 13px;
                color: var(--ink-3);
                font-weight: 600;
                align-items: center;
            }
            .pd-id .meta .dot {
                width: 3px;
                height: 3px;
                border-radius: 50%;
                background: rgba(54, 54, 54, 0.4);
            }
            .pd-actions {
                margin-left: auto;
                display: flex;
                gap: 10px;
            }

            .pd-cols {
                display: grid;
                grid-template-columns: 320px 1fr 320px;
                gap: 0;
                flex: 1;
                align-items: stretch;
            }
            .pd-side {
                padding: 24px;
                background: #fff;
                border-right: 1px solid var(--line);
                overflow: auto;
            }
            .pd-side.right {
                border-right: 0;
                border-left: 1px solid var(--line);
            }
            .pd-main {
                padding: 24px;
                background: var(--bg);
                overflow: auto;
            }
            .pd-card {
                background: #fff;
                border-radius: 18px;
                padding: 18px 20px;
                margin-bottom: 14px;
            }
            .pd-card h3 {
                margin: 0 0 12px;
                font-size: 14px;
                font-weight: 700;
                color: var(--ink);
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }
            .pd-card .row {
                display: flex;
                justify-content: space-between;
                font-size: 13px;
                font-weight: 600;
                color: var(--ink-2);
                padding: 6px 0;
                border-bottom: 1px solid var(--line);
            }
            .pd-card .row:last-child {
                border-bottom: 0;
            }
            .pd-card .row .k {
                color: var(--ink-3);
            }

            /* Tooth chart */
            .chart-card {
                background: #fff;
                border-radius: 18px;
                padding: 24px;
                margin-bottom: 14px;
            }
            .chart-card h3 {
                margin: 0 0 6px;
                font-size: 18px;
                font-weight: 700;
                color: var(--ink-2);
                letter-spacing: -0.01em;
            }
            .chart-legend {
                display: flex;
                gap: 18px;
                font-size: 11px;
                font-weight: 700;
                color: var(--ink-3);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                margin-bottom: 18px;
            }
            .chart-legend .lg {
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            .chart-legend .sw {
                width: 10px;
                height: 10px;
                border-radius: 3px;
            }
            .arch {
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .arch-row {
                display: flex;
                align-items: center;
                gap: 6px;
                justify-content: center;
            }
            .tooth {
                width: 38px;
                height: 48px;
                border-radius: 6px;
                background: #f7f6f3;
                border: 1px solid var(--line);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-end;
                padding-bottom: 3px;
                font-size: 9px;
                font-weight: 700;
                color: var(--ink-3);
                position: relative;
                cursor: pointer;
                transition:
                    transform 0.1s,
                    box-shadow 0.12s;
            }
            .tooth::before {
                content: "";
                display: block;
                width: 18px;
                height: 24px;
                border-radius: 8px 8px 6px 6px;
                background: #fff;
                border: 1px solid var(--line-strong);
                margin-bottom: 2px;
            }
            .tooth.upper::before {
                border-radius: 8px 8px 12px 12px;
            }
            .tooth.lower::before {
                border-radius: 12px 12px 8px 8px;
            }
            .tooth:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-soft);
            }
            .tooth[data-cond="treated"]::before {
                background: #a6cce0;
                border-color: #5c8aad;
            }
            .tooth[data-cond="cavity"]::before {
                background: #ffd4d4;
                border-color: #a64242;
            }
            .tooth[data-cond="planned"]::before {
                background: #ffe2a8;
                border-color: #b65a1f;
            }
            .tooth[data-cond="missing"] {
                opacity: 0.3;
            }
            .tooth[data-cond="missing"]::before {
                background: transparent;
                border-style: dashed;
            }
            .tooth.selected {
                box-shadow: 0 0 0 2px var(--persimmon);
            }

            .chart-card.selected {
                box-shadow: 0 0 0 2px var(--persimmon);
            }

            /* ---------- Realistic Tooth Chart ---------- */
            .rtc {
                padding: 10px 6px;
                user-select: none;
            }
            .rtc-nums {
                display: grid;
                grid-template-columns: repeat(16, 1fr);
                gap: 0;
                justify-items: center;
                font-size: 13px;
                font-weight: 700;
                color: var(--persimmon);
                font-family: "JetBrains Mono", monospace;
                letter-spacing: 0.02em;
            }
            .rtc-nums .num {
                padding: 6px 0;
                transition:
                    color 0.12s,
                    background 0.12s;
                border-radius: 6px;
                width: 36px;
                text-align: center;
            }
            .rtc-nums .num.sel {
                background: var(--persimmon);
                color: #fff;
            }
            .rtc-row {
                display: grid;
                grid-template-columns: repeat(16, 1fr);
                justify-items: center;
                align-items: end;
                padding: 8px 0;
            }
            .rtc-row.lower {
                align-items: start;
            }
            .rtc-midline {
                height: 2px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    var(--line) 8%,
                    var(--line) 92%,
                    transparent
                );
                margin: 6px 0;
                position: relative;
            }
            .rtc-mid-tick {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--persimmon);
            }

            /* Tooltip on hovered tooth — sticky in container corner */
            .rtc-tooltip {
                position: absolute;
                background: #162b41;
                color: #fff;
                border-radius: 12px;
                padding: 10px 14px;
                font-size: 12px;
                font-weight: 600;
                line-height: 1.4;
                box-shadow: var(--shadow-pop);
                pointer-events: none;
                z-index: 20;
                min-width: 180px;
            }
            .rtc-tooltip .tt-num {
                font-size: 18px;
                font-weight: 800;
                letter-spacing: -0.02em;
                color: #fff;
                font-family: "JetBrains Mono", monospace;
            }
            .rtc-tooltip .tt-name {
                color: rgba(255, 255, 255, 0.8);
                margin-bottom: 6px;
            }
            .rtc-tooltip .tt-row {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                font-size: 11px;
                color: rgba(255, 255, 255, 0.7);
            }
            .rtc-tooltip .tt-row b {
                color: #fff;
                font-weight: 700;
            }

            /* ---------- Care Panel ---------- */
            .care-panel {
                background: #fff;
                border-radius: 18px;
                padding: 0;
                border: 1px solid var(--line);
                overflow: hidden;
            }
            .cp-tabs {
                display: flex;
                align-items: center;
                gap: 24px;
                padding: 14px 18px 0;
                border-bottom: 1px solid var(--line);
                position: relative;
            }
            .cp-tabs button {
                font-size: 14px;
                font-weight: 700;
                color: var(--ink-3);
                padding: 0 0 12px;
                position: relative;
            }
            .cp-tabs button.on {
                color: #3d9da8;
            }
            .cp-tabs button.on::after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                bottom: -1px;
                height: 2px;
                background: #3d9da8;
            }
            .cp-actions {
                margin-left: auto;
                display: flex;
                gap: 8px;
                padding-bottom: 10px;
            }
            .cp-mini {
                background: #3d9da8;
                color: #fff;
                font-size: 11px;
                font-weight: 700;
                padding: 7px 12px;
                border-radius: 6px;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                transition: filter 0.12s;
            }
            .cp-mini:hover {
                filter: brightness(1.05);
            }
            .cp-form {
                padding: 14px 18px;
                border-bottom: 1px solid var(--line);
                background: #fbfaf7;
            }
            .cp-row {
                display: grid;
                grid-template-columns: 140px 14px 1fr;
                align-items: center;
                gap: 8px;
                margin-bottom: 10px;
            }
            .cp-row:last-child {
                margin-bottom: 0;
            }
            .cp-l {
                font-size: 12px;
                font-weight: 700;
                color: var(--ink-2);
            }
            .cp-c {
                font-size: 12px;
                color: var(--ink-3);
            }
            .cp-radios {
                display: flex;
                gap: 18px;
            }
            .cp-radio {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
                font-size: 13px;
                font-weight: 600;
                color: var(--ink-2);
            }
            .cp-radio .rd {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                border: 2px solid var(--line-strong);
                display: grid;
                place-items: center;
                transition: border-color 0.12s;
            }
            .cp-radio.on .rd {
                border-color: #3d9da8;
            }
            .cp-radio.on .rd::after {
                content: "";
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #3d9da8;
            }
            .cp-select {
                width: 100%;
                height: 36px;
                border: 1px solid var(--line-strong);
                border-radius: 6px;
                padding: 0 12px;
                font-size: 13px;
                font-weight: 600;
                color: var(--ink-2);
                background: #fff;
                -webkit-appearance: menulist;
            }
            .cp-grid {
                display: grid;
                grid-template-columns: repeat(6, 1fr);
                gap: 6px;
                padding: 14px 18px 8px;
            }
            .care-btn {
                border-radius: 8px;
                padding: 14px 6px;
                min-height: 54px;
                font-size: 11px;
                font-weight: 700;
                color: #1f4a2d;
                letter-spacing: 0.02em;
                text-align: center;
                transition:
                    transform 0.1s,
                    filter 0.12s,
                    box-shadow 0.15s;
                border: 1px solid rgba(0, 0, 0, 0.04);
                position: relative;
                line-height: 1.2;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
            }
            .care-btn:hover:not(:disabled) {
                transform: translateY(-1px);
                filter: brightness(1.05);
                box-shadow: var(--shadow-soft);
            }
            .care-btn:active:not(:disabled) {
                transform: translateY(0);
            }
            .care-btn .info {
                width: 13px;
                height: 13px;

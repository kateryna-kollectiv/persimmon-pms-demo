<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Persimmon — Sign in</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#F7F6F3;
    --ink:#162B41;
    --ink-mute:#6A697D;
    --persimmon:#F73C1F;
    --line:#CDC7C4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(22, 43, 65, 0.06);
  }
  h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  p {
    color: var(--ink-mute);
    font-size: 14px;
    margin: 0 0 24px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    font-size: 15px;
    font-family: inherit;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--ink);
    outline: none;
    transition: border-color 120ms;
  }
  input[type="password"]:focus {
    border-color: var(--persimmon);
  }
  button {
    width: 100%;
    margin-top: 16px;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: #fff;
    background: var(--persimmon);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 120ms;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  .err {
    color: var(--persimmon);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--persimmon);
  }
  .brand-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>
  <form class="card" id="f">
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-name">Persimmon</div>
    </div>
    <h1>This demo is private</h1>
    <p>Enter the password to continue.</p>
    <label for="p">Password</label>
    <input type="password" id="p" autocomplete="current-password" autofocus required />
    <button type="submit" id="b">Continue</button>
    <div class="err" id="e"></div>
  </form>
<script>
  const f = document.getElementById('f');
  const p = document.getElementById('p');
  const b = document.getElementById('b');
  const e = document.getElementById('e');
  f.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    e.textContent = '';
    b.disabled = true;
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ password: p.value }),
      });
      if (r.ok) {
        window.location.replace('/');
      } else if (r.status === 401) {
        e.textContent = 'Incorrect password.';
        p.select();
      } else {
        e.textContent = 'Something went wrong. Try again.';
      }
    } catch {
      e.textContent = 'Network error. Try again.';
    } finally {
      b.disabled = false;
    }
  });
</script>
</body>
</html>
